<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Theme Variables */
    :root {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --input-bg: #ffffff;
      --input-border: #d1d5db;
      --brand: #000000;
      --brand-text: #ffffff;
      --status-parsing: #f59e0b;
      --status-live: #059669;
      --status-offline: #ef4444;
    }
    [data-theme="dark"] {
      --bg: #111827;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --border: #374151;
      --input-bg: #1f2937;
      --input-border: #4b5563;
      --brand: #ffffff;
      --brand-text: #000000;
    }

    * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body {
      width: 340px; margin: 0; padding: 14px;
      background-color: var(--bg); color: var(--text);
      transition: background-color 0.2s, color 0.2s;
    }

    /* Header & Tabs */
    .header {
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 12px;
    }
    .logo-section { display: flex; align-items: center; gap: 8px; }
    .logo-badge {
      width: 20px; height: 20px; border-radius: 4px;
      background-color: var(--brand); color: var(--brand-text);
      display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900;
    }
    .app-title { font-size: 13px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
    .status-section { display: flex; flex-direction: column; align-items: flex-end; font-size: 9px; color: var(--text-muted); }
    .status-indicator { font-weight: 700; margin-bottom: 1px; }
    .status-parsing { color: var(--status-parsing); }
    .status-live { color: var(--status-live); }
    .status-offline { color: var(--status-offline); }

    .tab-bar { display: flex; gap: 8px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
    .tab-btn {
      background: none; border: none; padding: 6px 10px; font-size: 11px; font-weight: 700;
      color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
    }
    .tab-btn.active { color: var(--text); border-bottom: 2px solid var(--brand); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Form Elements */
    .form-group { margin-bottom: 10px; }
    .form-group label {
      display: block; font-size: 9px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 4px; color: var(--text);
    }
    .form-input {
      width: 100%; padding: 6px 10px; font-size: 12px; font-weight: 500;
      background-color: var(--input-bg); color: var(--text);
      border: 1px solid var(--input-border); border-radius: 4px;
      outline: none; transition: border-color 0.15s ease;
    }
    .form-input:focus { border-color: var(--brand); }
    textarea.form-input { height: 56px; resize: none; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    
    .btn-submit {
      width: 100%; padding: 9px 12px; font-size: 12px; font-weight: 700;
      background-color: var(--brand); color: var(--brand-text);
      border: 1px solid var(--brand); border-radius: 4px;
      cursor: pointer; transition: opacity 0.15s ease; margin-top: 4px;
    }
    .btn-submit:hover { opacity: 0.8; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo-section">
      <div class="logo-badge">AS</div>
      <h1 class="app-title">Auto Scheduler Extension</h1>
    </div>
    <div class="status-section">
      <span id="status-text" class="status-indicator status-parsing">• Parsing...</span>
      <span id="scan-time">Waiting...</span>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="tab-bar">
    <button id="nav-main" class="tab-btn active">Schedule</button>
    <button id="nav-settings" class="tab-btn">Settings</button>
  </div>

  <!-- Main View -->
  <div id="view-main" class="tab-content active">
    <div class="form-group">
      <label>Calculated Event Title</label>
      <input type="text" id="event-title" class="form-input">
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>Parsed Date</label>
        <input type="date" id="event-date" class="form-input">
      </div>
      <div class="form-group">
        <label>Parsed Time</label>
        <input type="time" id="event-time" class="form-input">
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label>Duration</label>
        <select id="event-duration" class="form-input">
          <option value="30">30 Min</option>
          <option value="45">45 Min</option>
          <option value="60" selected>1 Hour</option>
          <option value="120">2 Hours</option>
        </select>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="event-location" class="form-input">
      </div>
    </div>

    <div class="form-group">
      <label>Meeting context & Description</label>
      <textarea id="event-desc" class="form-input"></textarea>
    </div>

    <button id="sync-btn" class="btn-submit" disabled>
      Sync to Calendar
    </button>
  </div>

  <!-- Settings View -->
  <div id="view-settings" class="tab-content">
    <div class="form-group">
      <label>Theme Preference</label>
      <select id="setting-theme" class="form-input">
        <option value="auto">System Default (Auto)</option>
        <option value="light">Light Mode</option>
        <option value="dark">Dark Mode</option>
      </select>
    </div>
    <div class="form-group">
      <label>Calendar Destination</label>
      <select id="setting-calendar" class="form-input">
        <option value="google">Google Calendar</option>
        <option value="outlook">Outlook Calendar</option>
        <option value="apple">Apple / iCloud (.ics)</option>
      </select>
    </div>
    <div style="margin-top:20px; font-size:10px; color:var(--text-muted); text-align:center;">
      Settings automatically saved.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
